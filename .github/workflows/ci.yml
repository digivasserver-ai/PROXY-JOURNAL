name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Run CLI smoke tests
        env:
          NO_COLOR: "1"
          PROXY_JOURNAL_HOME: ${{ runner.temp }}/pj-test
        run: |
          node bin/proxy-journal.mjs help
          node bin/proxy-journal.mjs version
          node bin/proxy-journal.mjs init "Proxy" "CI"
          node bin/proxy-journal.mjs status
          node bin/proxy-journal.mjs log smoke "ci run"
          node bin/proxy-journal.mjs remember "CI" "Smoke test episode"
          node bin/proxy-journal.mjs fact runner "github-actions"
          node bin/proxy-journal.mjs open "Ship release" "public GitHub"
          node bin/proxy-journal.mjs history 5
          node bin/proxy-journal.mjs close "Ship release"
          node bin/proxy-journal.mjs preserve
          node bin/proxy-journal.mjs wake | head -25

      - name: Unit tests
        env:
          NO_COLOR: "1"
        run: node --test test/*.test.mjs

  publish:
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Run tests before publish
        run: npm test

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "Release ${{ github.ref_name }}" \
            --notes "Published to npm: https://www.npmjs.com/package/proxy-journal

            See [CHANGELOG](https://github.com/digivasserver-ai/PROXY-JOURNAL/blob/main/CHANGELOG.md) for details." \
            --verify-tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
